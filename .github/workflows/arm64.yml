name: Arm64 Cross Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-aarch64:
    name: Build aarch64 (cross)
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/cross-rs/aarch64-unknown-linux-musl:edge
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Build (musl aarch64)
        run: |
          chmod +x ./scripts/build.sh
          ./scripts/build.sh aarch64-unknown-linux-musl

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aarch64-musl
          path: |
            yazi-aarch64-unknown-linux-musl.zip
            yazi-aarch64-unknown-linux-musl.deb
