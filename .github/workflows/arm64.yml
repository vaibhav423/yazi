name: Arm64 Cross Build

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SCCACHE_GHA_ENABLED: true
  RUSTC_WRAPPER: sccache
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-aarch64:
    name: Build aarch64 (cross)
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -yq curl unzip zip

      - name: Install Android NDK
        run: |
          # choose a reasonably recent stable NDK release
          NDK_NAME=android-ndk-r25b
          NDK_ZIP=${NDK_NAME}-linux.zip
          curl -fsSL "https://dl.google.com/android/repository/${NDK_ZIP}" -o ndk.zip
          unzip -q ndk.zip
          echo "ANDROID_NDK_HOME=$PWD/${NDK_NAME}" >> $GITHUB_ENV

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal

      - name: Install cargo-ndk
        run: |
          cargo install cargo-ndk || true

      - name: Build Android (aarch64)
        run: ./scripts/build-android.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: aarch64-android
          path: yazi-aarch64-linux-android.zip
